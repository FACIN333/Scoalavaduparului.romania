<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Școala Inv Radu Ion</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            background: #d60000;
            padding: 25px;
            text-align: center;
        }

        .menu {
            background: linear-gradient(90deg, #ff0000, #ff6a00);

            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        nav {
            background: #222;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: red;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .box {
            background: #1f1f1f;
            padding: 20px;
            width: 220px;
            height: 140px;
            border-radius: 15px;
            text-align: center;
            font-size: 16px;
            transition: 0.3s;
            color: white;
        }

        .box:hover {
            background: #2a2a2a;
            transform: scale(1.05);
        }

        .poze {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .comentarii {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            color: gray;
        }

</head>

    <div class="box">
