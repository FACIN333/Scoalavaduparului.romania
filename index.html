<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Școala Inv Radu Ion</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        /* Meniu sus */
        .menu {
            background: linear-gradient(90deg, #ff0000, #ff6a00);
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        /* Zona butoane */
        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 80px;
        }

        .box {
            width: 200px;
            height: 120px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .box:hover {
            transform: scale(1.1);
        }

        .poze {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .comentarii {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
        }
    </style>
</head>
<body>

    <div class="menu">
        Școala Inv Radu Ion
    </div>

    <div class="container">
        <a href="poze.html" class="box poze">Poze</a>
        <a href="comentarii.html" class="box comentarii">Comentarii</a>
    </div>

</body>
</html>
