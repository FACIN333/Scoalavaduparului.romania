<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meniu</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.title{
    text-align:center;
    padding:20px;
    font-size:26px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0000,#ff6a00);
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:30px;
}

.box{
    height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.07);
}

/* culori */
.poze{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.proiecte{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.contact{background:linear-gradient(135deg,#11998e,#38ef7d);}
.info{background:linear-gradient(135deg,#f7971e,#ffd200);}

/* pisici jos */
.cats{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.cats img{
    width:120px;
    border-radius:10px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="title">
    Școala Inv Radu Ion
</div>

<div class="container">

    <a href="poze.html" class="box poze">📸 Poze + Comentarii</a>
    <a href="proiecte.html" class="box proiecte">📂 Proiecte</a>
    <a href="contact.html" class="box contact">📞 Contacte</a>
    <a href="info.html" class="box info">ℹ Informații</a>

</div>

<!-- PISICI -->
<div class="cats">
    <img src="images/cat1.jpg">
    <img src="images/cat2.jpg">
    <img src="images/cat3.jpg">
</div>

</body>
</html>
