<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Școala Inv Radu Ion</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0f0f0f,#000);
    color:white;
}

/* MENIU */
.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:60px 40px;
}

/* CASUTE */
.card{
    width:220px;
    height:130px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    text-align:center;
    font-size:18px;
}

.card:hover{
    transform:scale(1.1);
}

/* culori */
.blue{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.purple{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.green{background:linear-gradient(135deg,#11998e,#38ef7d);}
.yellow{background:linear-gradient(135deg,#f7971e,#ffd200);}
</style>
</head>

<body>

<div class="menu">

    <div class="card blue">
        📸<br>
        Poze + Comentarii
    </div>

    <div class="card purple">
        📂<br>
        Proiecte
    </div>

    <div class="card green">
        📞<br>
        Contact
    </div>

    <div class="card yellow">
        ℹ<br>
        Informații
    </div>

</div>

</body>
</html>
