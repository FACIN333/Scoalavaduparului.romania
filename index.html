<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Școala Inv Radu Ion</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle, #111, black);
    color:white;
}

/* TITLU SUS */
.title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:25px;
    background:linear-gradient(90deg, red, orange);
    box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

/* BUTOANE */
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
    flex-wrap:wrap;
}

.box{
    width:200px;
    height:120px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.box:hover{
    transform:scale(1.1) rotate(1deg);
}

/* culori */
.blue{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.purple{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.green{background:linear-gradient(135deg,#11998e,#38ef7d);}
.yellow{background:linear-gradient(135deg,#f7971e,#ffd200);}

/* PISICI JOS */
.cats{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
}

.cats img{
    width:160px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.6);
}

.zzz{
    text-align:center;
    margin-top:5px;
    font-size:18px;
    opacity:0.7;
}

/* 🐱 PISICA MASCOTĂ */
.cat-float{
    position:fixed;
    bottom:10px;
    right:-200px;
    width:120px;
    animation:moveCat 8s infinite;
    z-index:999;
}

@keyframes moveCat {
    0% { right:-200px; }
    50% { right:20px; }
    100% { right:-200px; }
}
</style>
</head>

<body>

<div class="title">
    Școala Inv Radu Ion
</div>

<div class="container">

    <a class="box blue" href="#">📸 Poze + Comentarii</a>
    <a class="box purple" href="#">📂 Proiecte</a>
    <a class="box green" href="#">📞 Contacte</a>
    <a class="box yellow" href="#">ℹ Informații</a>

</div>

<!-- PISICI -->
<div class="cats">

    <div>
        <img src="https://placekitten.com/200/200">
        <div class="zzz">Zzz</div>
    </div>

    <div>
        <img src="https://placekitten.com/201/200">
        <div class="zzz">Zzz</div>
    </div>

    <div>
        <img src="https://placekitten.com/202/200">
        <div class="zzz">Zzz</div>
    </div>

</div>

<!-- 🐱 PISICA MASCOTĂ ANIMATĂ -->
<img class="cat-float" src="https://placekitten.com/300/300">

</body>
</html>
