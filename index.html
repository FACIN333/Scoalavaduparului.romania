<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Școala Inv Radu Ion</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    background: #d60000;
    text-align: center;
    padding: 25px;
}

.menu-title {
    background: linear-gradient(90deg, #ff0000, #ff6a00);
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: #1f1f1f;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #2a2a2a;
}

.poze { background: linear-gradient(135deg, #00c6ff, #0072ff); }
.proiecte { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
.contact { background: linear-gradient(135deg, #11998e, #38ef7d); }
.info { background: linear-gradient(135deg, #f7971e, #ffd200); }

footer {
    text-align: center;
    padding: 15px;
    color: gray;
    background: #000;
}
</style>
</head>

<body>

<header>
    <h1>🏫 Școala Vadu-Parului</h1>
</header>

<div class="menu-title">
    Școala Inv Radu Ion
</div>

<div class="container">

    <a href="poze.html" class="card poze">
        📸 Poze + Comentarii
    </a>

    <a href="proiecte.html" class="card proiecte">
        📂 Proiecte
    </a>

    <a href="contact.html" class="card contact">
        📞 Contacte
    </a>

    <a href="info.html" class="card info">
        ℹ Informații Școală
    </a>

</div>

<footer>
    © 2026 Site realizat de elev
</footer>

</body>
</html>
<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Poze</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
img { width:250px; margin:10px; border-radius:10px; }
</style>
</head>
<body>

<h1>📸 Poze</h1>

<img src="images/poza1.jpg">
<img src="images/poza2.jpg">

<h2>💬 Comentarii</h2>

<input id="nume" placeholder="Nume">
<input id="msg" placeholder="Comentariu">
<button onclick="add()">Trimite</button>

<div id="c"></div>

<script>
function add() {
    let n = document.getElementById("nume").value;
    let m = document.getElementById("msg").value;
    document.getElementById("c").innerHTML += "<p><b>"+n+":</b> "+m+"</p>";
}
</script>

<br><br>
<a href="index.html" style="color:red;">⬅ Înapoi</a>

</body>
</html>
