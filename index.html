<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Școala Inv Radu Ion</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0f0f0f,#000);
    color:white;
}

/* TITLU */
header{
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(90deg, red, orange);
}

/* MENIU */
.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

/* CASUTE */
.card{
    width:220px;
    height:130px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    text-align:center;
    font-size:18px;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:scale(1.1);
}

/* culori */
.blue{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.purple{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.green{background:linear-gradient(135deg,#11998e,#38ef7d);}
.yellow{background:linear-gradient(135deg,#f7971e,#ffd200);}

/* 🐱 PISICA */
.cat-card{
    background:linear-gradient(135deg,#ff4e50,#f9d423);
    cursor:pointer;
}

.cat-card::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
    top:0;
    left:-100%;
    transform:skewX(-20deg);
    transition:0.5s;
}

.cat-card:hover::after{
    left:100%;
}

.cat-card:hover{
    transform:scale(1.1) rotate(-1deg);
}
</style>
</head>

<body>

<header>
    Școala Inv Radu Ion
</header>

<div class="menu">

    <div class="card blue">
        📸<br>
        Poze + Comentarii
    </div>

    <div class="card purple">
        📂<br>
        Proiecte
    </div>

    <div class="card green">
        📞<br>
        Contact
    </div>

    <div class="card yellow">
        ℹ<br>
        Informații
    </div>

    <!-- 🐱 PISICA -->
    <div class="card cat-card" onclick="miaun()">
        🐱<br>
        Pisica școlii<br>
        <small>(click pe mine)</small>
    </div>

</div>

<script>
function miaun(){
    let audio = new Audio("https://www.soundjay.com/meow/cat-meow-1.mp3");
    audio.play();
}
</script>

</body>
</html>
