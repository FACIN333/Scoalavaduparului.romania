<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Școala Inv Radu Ion</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0f0f0f,#000);
    color:white;
}

/* TITLU */
header{
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(90deg, red, orange);
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* MENIU */
.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.card{
    width:200px;
    height:120px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.card:hover{
    transform:scale(1.1);
}

/* culori */
.blue{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.purple{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.green{background:linear-gradient(135deg,#11998e,#38ef7d);}
.yellow{background:linear-gradient(135deg,#f7971e,#ffd200);}

/* GALERIE PISICI */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:20px;
}

.cat{
    text-align:center;
}

.cat img{
    width:170px;
    height:170px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.7);
}

.cat p{
    margin-top:5px;
    opacity:0.7;
}

/* PISICA MASCOTĂ */
.floating-cat{
    position:fixed;
    bottom:10px;
    right:10px;
    width:120px;
    animation:float 4s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<header>
    Școala Inv Radu Ion
</header>

<div class="menu">

    <a class="card blue" href="#">📸 Poze + Comentarii</a>
    <a class="card purple" href="#">📂 Proiecte</a>
    <a class="card green" href="#">📞 Contact</a>
    <a class="card yellow" href="#">ℹ Informații</a>

</div>

<!-- PISICI -->
<div class="gallery">

    <div class="cat">
        <img src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg">
        <p>Zzz 💤</p>
    </div>

    <div class="cat">
        <img src="https://cdn2.thecatapi.com/images/MTY3ODIyMg.jpg">
        <p>Zzz 💤</p>
    </div>

    <div class="cat">
        <img src="https://cdn2.thecatapi.com/images/MTY3ODIyNA.jpg">
        <p>Zzz 💤</p>
    </div>

</div>

<!-- PISICA CARE SE MIȘCĂ -->
<img class="floating-cat" src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg">

</body>
</html>
