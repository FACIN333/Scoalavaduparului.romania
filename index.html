<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoala Gim Inv Radu Ion</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* APP CARD */
.app {
    max-width: 500px;
    margin: 20px auto;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

/* HEADER */
.header {
    background: #004a99;
    color: white;
    padding: 20px;
    font-size: 20px;
    text-align: center;
}

/* MENU */
.menu a {
    display: flex;
    align-items: center;
    padding: 15px;
    text-decoration: none;
    color: black;
    border-bottom: 1px solid #eee;
    transition: 0.3s;
}

.menu a:hover {
    background: #f0f0f0;
    transform: scale(1.02);
}

/* ICON */
.icon {
    margin-right: 10px;
    font-size: 20px;
}

/* PAGE */
.page {
    display: none;
    padding: 20px;
    animation: fadeIn 0.4s ease;
}

/* ACTIVE PAGE */
.active {
    display: block;
}

/* BACK BUTTON */
.back {
    margin-top: 20px;
    display: inline-block;
    padding: 10px;
    background: #004a99;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

/* CHAT */
.chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 10px;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
}

.chat-input button {
    padding: 10px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">

<div class="header">Scoala Gim Inv Radu Ion</div>

<!-- MENU -->
<div class="menu" id="menu">
    <a href="#" onclick="openPage('contact')"><span class="icon">📞</span>Contacte si opinii</a>
    <a href="#" onclick="openPage('chat')"><span class="icon">💬</span>Chat</a>
    <a href="#" onclick="openPage('desene')"><span class="icon">🎨</span>Desene</a>
    <a href="#" onclick="openPage('proiecte')"><span class="icon">📁</span>Proiecte</a>
    <a href="#" onclick="openPage('info')"><span class="icon">ℹ️</span>Info</a>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
    <h2>Contacte si opinii</h2>
    <p>Aici poti scrie opinii.</p>
    <a href="#" class="back" onclick="goBack()">⬅ Inapoi</a>
</div>

<!-- CHAT -->
<div id="chat" class="page">
    <h2>Chat</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="Scrie mesaj...">
        <button onclick="sendMsg()">Trimite</button>
    </div>

    <a href="#" class="back" onclick="goBack()">⬅ Inapoi</a>
</div>

<!-- DESENE -->
<div id="desene" class="page">
    <h2>Desene</h2>
    <p>Aici adaugi desene.</p>
    <a href="#" class="back" onclick="goBack()">⬅ Inapoi</a>
</div>

<!-- PROIECTE -->
<div id="proiecte" class="page">
    <h2>Proiecte</h2>
    <p>Aici adaugi proiecte.</p>
    <a href="#" class="back" onclick="goBack()">⬅ Inapoi</a>
</div>

<!-- INFO -->
<div id="info" class="page">
    <h2>Info</h2>
    <p>Informatii despre scoala.</p>
    <a href="#" class="back" onclick="goBack()">⬅ Inapoi</a>
</div>

</div>

<script>
function openPage(id) {
    document.getElementById("menu").style.display = "none";
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goBack() {
    document.getElementById("menu").style.display = "block";
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
}

/* CHAT FUNCTION */
function sendMsg() {
    let input = document.getElementById("msg");
    let box = document.getElementById("chatBox");

    if(input.value.trim() !== "") {
        box.innerHTML += "<div>👤 " + input.value + "</div>";
        input.value = "";
        box.scrollTop = box.scrollHeight;
    }
}
</script>

</body>
</html>
