<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

form{
    margin-top:50px;
}

input, textarea{
    width:250px;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Contact</h1>

<form action="https://formspree.io/f/XXXXXXX" method="POST">
    
    <input type="text" name="name" placeholder="Numele tău" required><br>
    
    <input type="email" name="email" placeholder="Email" required><br>
    
    <textarea name="message" placeholder="Mesajul tău" required></textarea><br>
    
    <button type="submit">Trimite</button>

</form>

</body>
</html>
