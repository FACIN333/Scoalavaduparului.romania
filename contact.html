<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

#chat{
    max-width:400px;
    margin:auto;
}

.msg{
    background:#222;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

input{
    padding:10px;
    width:200px;
}

button{
    padding:10px;
    background:red;
    color:white;
    border:none;
}
a{
    color:white;
    display:block;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Chat școală</h1>

<div id="chat"></div>

<input id="text" placeholder="Scrie mesaj...">
<button onclick="send()">Trimite</button>

<a href="index.html">🔙 Înapoi</a>

<script>
function load(){
    let data = JSON.parse(localStorage.getItem("chat") || "[]");
    let box = document.getElementById("chat");
    box.innerHTML = "";
    data.forEach(m=>{
        box.innerHTML += `<div class="msg">${m}</div>`;
    });
}

function send(){
    let text = document.getElementById("text").value;
    if(!text) return;

    let data = JSON.parse(localStorage.getItem("chat") || "[]");
    data.push(text);
    localStorage.setItem("chat", JSON.stringify(data));

    document.getElementById("text").value="";
    load();
}

load();
</script>

</body>
</html>
